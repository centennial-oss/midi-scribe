name: Release

on:
  push:
    tags:
      # Semantic version tags: v1.0.0, v2.1.3, etc.
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.repository_owner == 'centennial-oss'
    runs-on: macos-26  # Minimum supported macOS; Apple Silicon runner
    env:
      APP_NAME: MIDI Scribe
      SCHEME_NAME: MIDI Scribe
      PROJECT_PATH: MIDI Scribe.xcodeproj
      MAC_ARCHIVE_PATH: "${{ github.workspace }}/build/MIDI Scribe-macOS-preflight.xcarchive"
      MAC_EXPORT_PATH: "${{ github.workspace }}/build/MacAppStoreExport-preflight"
      IOS_ARCHIVE_PATH: "${{ github.workspace }}/build/MIDI Scribe-iOS-preflight.xcarchive"
      IOS_EXPORT_PATH: "${{ github.workspace }}/build/iOSAppStoreExport-preflight"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Validate required secrets are present
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVID_CERT_BASE64: ${{ secrets.APPLE_DEVID_CERT_BASE64 }}
          APPLE_DIST_APP_CERT_BASE64: ${{ secrets.APPLE_DIST_APP_CERT_BASE64 }}
          APPLE_DIST_INSTALLER_CERT_BASE64: ${{ secrets.APPLE_DIST_INSTALLER_CERT_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          MAC_APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.MAC_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
          MAC_APP_STORE_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.MAC_APP_STORE_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
          IOS_APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
          IOS_APP_STORE_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APP_STORE_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          REQUIRED_VARS=(
            APPLE_TEAM_ID
            APPLE_DEVID_CERT_BASE64
            APPLE_DIST_APP_CERT_BASE64
            APPLE_DIST_INSTALLER_CERT_BASE64
            APPLE_CERTIFICATE_PASSWORD
            KEYCHAIN_PASSWORD
            APPLE_SIGNING_IDENTITY
            APP_STORE_CONNECT_KEY_ID
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_API_KEY
            MAC_APP_STORE_PROVISIONING_PROFILE_BASE64
            MAC_APP_STORE_EXTENSION_PROVISIONING_PROFILE_BASE64
            IOS_APP_STORE_PROVISIONING_PROFILE_BASE64
            IOS_APP_STORE_EXTENSION_PROVISIONING_PROFILE_BASE64
          )
          for var in "${REQUIRED_VARS[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret/value: $var"
              exit 1
            fi
          done

      - name: Import signing certificates
        env:
          APPLE_DEVID_CERT_BASE64: ${{ secrets.APPLE_DEVID_CERT_BASE64 }}
          APPLE_DIST_APP_CERT_BASE64: ${{ secrets.APPLE_DIST_APP_CERT_BASE64 }}
          APPLE_DIST_INSTALLER_CERT_BASE64: ${{ secrets.APPLE_DIST_INSTALLER_CERT_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security list-keychains -d user -s build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$APPLE_DEVID_CERT_BASE64" | base64 --decode > devid.p12
          echo "$APPLE_DIST_APP_CERT_BASE64" | base64 --decode > dist_app.p12
          echo "$APPLE_DIST_INSTALLER_CERT_BASE64" | base64 --decode > dist_installer.p12
          for p12 in devid.p12 dist_app.p12 dist_installer.p12; do
            security import "$p12" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/xcodebuild
          done
          rm devid.p12 dist_app.p12 dist_installer.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Validate signing identities in CI keychain
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          # Code-signing identities (Developer ID, Apple/3rd-party distribution app certs)
          security find-identity -v -p codesigning build.keychain | tee codesign-identities.txt
          # All identities including installer/package certs (not returned by -p codesigning)
          security find-identity -v build.keychain | tee all-identities.txt
          echo "--- codesigning identities ---"
          cat codesign-identities.txt
          echo "--- all identities ---"
          cat all-identities.txt
          if ! grep -F "$APPLE_SIGNING_IDENTITY" codesign-identities.txt > /dev/null; then
            echo "::error::APPLE_SIGNING_IDENTITY not found in build.keychain: $APPLE_SIGNING_IDENTITY"
            exit 1
          fi
          if ! grep -E "Developer ID Application" codesign-identities.txt > /dev/null; then
            echo "::error::No Developer ID Application identity found in imported certificates."
            exit 1
          fi
          # Cert names are always prefixed with these strings (e.g. "3rd Party Mac Developer Application: Name (TEAM)")
          if grep -F "Apple Distribution" codesign-identities.txt > /dev/null; then
            echo "MAC_APP_STORE_SIGNING_CERTIFICATE=Apple Distribution" >> "$GITHUB_ENV"
          elif grep -F "3rd Party Mac Developer Application" codesign-identities.txt > /dev/null; then
            echo "MAC_APP_STORE_SIGNING_CERTIFICATE=3rd Party Mac Developer Application" >> "$GITHUB_ENV"
          else
            echo "::error::No Apple Distribution or 3rd Party Mac Developer Application identity found in imported certificates."
            exit 1
          fi
          if ! grep -F "3rd Party Mac Developer Installer" all-identities.txt > /dev/null; then
            echo "::error::No 3rd Party Mac Developer Installer identity found in imported certificates."
            exit 1
          fi
          if grep -F "Apple Distribution" codesign-identities.txt > /dev/null; then
            echo "IOS_APP_STORE_SIGNING_CERTIFICATE=Apple Distribution" >> "$GITHUB_ENV"
          elif grep -F "iPhone Distribution" codesign-identities.txt > /dev/null; then
            echo "IOS_APP_STORE_SIGNING_CERTIFICATE=iPhone Distribution" >> "$GITHUB_ENV"
          else
            echo "::error::No Apple Distribution/iPhone Distribution identity found in imported certificates."
            exit 1
          fi

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode \
            > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Install Mac App Store provisioning profile
        env:
          MAC_APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.MAC_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$MAC_APP_STORE_PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/profile.provisionprofile
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          UUID=$(security cms -D -i /tmp/profile.provisionprofile 2>/dev/null | plutil -extract UUID raw - 2>/dev/null || echo "mac-app-store")
          cp /tmp/profile.provisionprofile "$PROFILE_DIR/${UUID}.provisionprofile"
          echo "Installed provisioning profile: $UUID"
          echo "MAC_APP_STORE_PROFILE_UUID=$UUID" >> "$GITHUB_ENV"

      - name: Install Mac App Store extension provisioning profile
        env:
          MAC_APP_STORE_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.MAC_APP_STORE_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$MAC_APP_STORE_EXTENSION_PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/profile-extension.provisionprofile
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          UUID=$(security cms -D -i /tmp/profile-extension.provisionprofile 2>/dev/null | plutil -extract UUID raw - 2>/dev/null || echo "mac-app-store-extension")
          cp /tmp/profile-extension.provisionprofile "$PROFILE_DIR/${UUID}.provisionprofile"
          echo "Installed extension provisioning profile: $UUID"
          echo "MAC_APP_STORE_EXTENSION_PROFILE_UUID=$UUID" >> "$GITHUB_ENV"

      - name: Install iOS App Store provisioning profile
        env:
          IOS_APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$IOS_APP_STORE_PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/ios-profile.mobileprovision
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          UUID=$(security cms -D -i /tmp/ios-profile.mobileprovision 2>/dev/null | plutil -extract UUID raw - 2>/dev/null || echo "ios-app-store")
          cp /tmp/ios-profile.mobileprovision "$PROFILE_DIR/${UUID}.mobileprovision"
          echo "Installed iOS provisioning profile: $UUID"
          echo "IOS_APP_STORE_PROFILE_UUID=$UUID" >> "$GITHUB_ENV"

      - name: Install iOS App Store extension provisioning profile
        env:
          IOS_APP_STORE_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APP_STORE_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$IOS_APP_STORE_EXTENSION_PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/ios-profile-extension.mobileprovision
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          UUID=$(security cms -D -i /tmp/ios-profile-extension.mobileprovision 2>/dev/null | plutil -extract UUID raw - 2>/dev/null || echo "ios-app-store-extension")
          cp /tmp/ios-profile-extension.mobileprovision "$PROFILE_DIR/${UUID}.mobileprovision"
          echo "Installed iOS extension provisioning profile: $UUID"
          echo "IOS_APP_STORE_EXTENSION_PROFILE_UUID=$UUID" >> "$GITHUB_ENV"

      - name: Verify installed provisioning profiles
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          for uuid in \
            "$MAC_APP_STORE_PROFILE_UUID" \
            "$MAC_APP_STORE_EXTENSION_PROFILE_UUID" \
            "$IOS_APP_STORE_PROFILE_UUID" \
            "$IOS_APP_STORE_EXTENSION_PROFILE_UUID"; do
            file=""
            if [ -f "$PROFILE_DIR/${uuid}.provisionprofile" ]; then
              file="$PROFILE_DIR/${uuid}.provisionprofile"
            elif [ -f "$PROFILE_DIR/${uuid}.mobileprovision" ]; then
              file="$PROFILE_DIR/${uuid}.mobileprovision"
            else
              echo "::error::Provisioning profile file not found for UUID: $uuid"
              exit 1
            fi
            echo "--- Profile $uuid ---"
            security cms -D -i "$file" > /tmp/profile.plist
            /usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist || true
            /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/profile.plist || true
            /usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.application-identifier" /tmp/profile.plist || true
            /usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.security.application-groups" /tmp/profile.plist || true
          done

      - name: Set version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          {
            printf 'MARKETING_VERSION = %s\n' "$VERSION"
            printf 'CURRENT_PROJECT_VERSION = %s\n' "$BUILD_NUMBER"
            printf 'INFOPLIST_KEY_NSHumanReadableCopyright = Copyright © 2026 Centennial OSS\n'
          } > "${{ env.SCHEME_NAME }}/Version.xcconfig"

      - name: Sanitize project.pbxproj (remove version overrides)
        run: |
          sed -i '' -e '/MARKETING_VERSION/d' -e '/CURRENT_PROJECT_VERSION/d' "$PROJECT_PATH/project.pbxproj"

      - name: Generate build info
        run: |
          COMMIT="${{ github.sha }}" \
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")" \
          CONFIG="Release" \
          ARCH="universal" \
          make generate-build-info

      - name: Build ${{ env.APP_NAME }} for direct distribution (GitHub release)
        run: |
          xcodebuild -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            ARCHS="arm64 x86_64" \
            CODE_SIGN_IDENTITY="-" \
            clean build

      - name: Code sign app + share extension (Developer ID - for GitHub release)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="build/Build/Products/Release/${{ env.APP_NAME }}.app"
          APP_XCENT="build/Build/Intermediates.noindex/${{ env.SCHEME_NAME }}.build/Release/${{ env.SCHEME_NAME }}.build/${{ env.APP_NAME }}.app.xcent"
          APP_ENTITLEMENTS="build/Release.entitlements"
          EXT_NAME="MIDI Scribe Share Extension"
          EXT_APP_PATH="$APP_PATH/Contents/PlugIns/$EXT_NAME.appex"
          EXT_BIN_PATH="$EXT_APP_PATH/Contents/MacOS/$EXT_NAME"
          EXT_XCENT="build/Build/Intermediates.noindex/${{ env.SCHEME_NAME }}.build/Release/$EXT_NAME.build/$EXT_NAME.appex.xcent"
          EXT_ENTITLEMENTS="build/Release-ShareExtension.entitlements"

          cp "$APP_XCENT" "$APP_ENTITLEMENTS"
          cp "$EXT_XCENT" "$EXT_ENTITLEMENTS"
          # get-task-allow is for debugging only; must be false for notarization
          /usr/libexec/PlistBuddy -c "Set :com.apple.security.get-task-allow false" "$APP_ENTITLEMENTS"
          /usr/libexec/PlistBuddy -c "Set :com.apple.security.get-task-allow false" "$EXT_ENTITLEMENTS"

          # Sign extension payload first, then extension bundle, then containing app.
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            --entitlements "$EXT_ENTITLEMENTS" \
            "$EXT_BIN_PATH"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            --entitlements "$EXT_ENTITLEMENTS" \
            "$EXT_APP_PATH"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            --entitlements "$APP_ENTITLEMENTS" \
            "$APP_PATH"
          codesign --verify --verbose --deep --strict "$APP_PATH"

      - name: Notarize app (GitHub release)
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --key ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID"
          cd build/Build/Products/Release
          ditto -c -k --keepParent "${{ env.APP_NAME }}.app" notarization.zip
          SUBMIT_OUTPUT=$(xcrun notarytool submit notarization.zip --keychain-profile "notarytool-profile" --wait 2>&1)
          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization was rejected (Invalid). Submission ID: $SUBMISSION_ID"
            echo "--- Notarization log ---"
            xcrun notarytool log "$SUBMISSION_ID" --keychain-profile "notarytool-profile" || true
            echo "--- End log ---"
            exit 1
          fi
          xcrun stapler staple "${{ env.APP_NAME }}.app"
          rm notarization.zip

      - name: Prepare release asset
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cd build/Build/Products/Release
          zip -r "${{ env.SCHEME_NAME }}-${VERSION}-macOS-universal.zip" "${{ env.APP_NAME }}.app"
          mv "${{ env.SCHEME_NAME }}-${VERSION}-macOS-universal.zip" "$GITHUB_WORKSPACE/"

      - name: Make DMG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG_NAME="${{ env.APP_NAME }}"
          DMG_FILE="${{ env.SCHEME_NAME }}-${VERSION}-macOS-universal.dmg"
          mkdir -p dmg-contents
          cp -R "build/Build/Products/Release/${{ env.APP_NAME }}.app" dmg-contents/
          ln -s /Applications dmg-contents/Applications
          hdiutil create -volname "$DMG_NAME" -srcfolder dmg-contents -ov -format UDZO "$DMG_FILE"
          rm -rf dmg-contents

      - name: Archive for Mac App Store
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Manual signing with pre-installed provisioning profile (required for TestFlight).
          # Profile is installed in "Install Mac App Store provisioning profile" step.
          xcodebuild archive \
            -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -archivePath "${{ env.MAC_ARCHIVE_PATH }}" \
            -destination 'generic/platform=macOS' \
            ARCHS="arm64 x86_64" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Export and upload Mac App Store package to App Store Connect
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # signingStyle=manual: sign locally with the certs imported into the keychain,
          # not via cloud signing (which requires elevated API key permissions).
          /usr/libexec/PlistBuddy \
            -c "Add :method string app-store-connect" \
            -c "Add :destination string upload" \
            -c "Add :signingStyle string manual" \
            -c "Add :signingCertificate string $MAC_APP_STORE_SIGNING_CERTIFICATE" \
            -c "Add :installerSigningCertificate string 3rd Party Mac Developer Installer" \
            -c "Add :provisioningProfiles dict" \
            -c "Add :provisioningProfiles:org.centennialoss.midiscribe string $MAC_APP_STORE_PROFILE_UUID" \
            -c "Add :provisioningProfiles:org.centennialoss.midiscribe.shareextension string $MAC_APP_STORE_EXTENSION_PROFILE_UUID" \
            -c "Add :teamID string $APPLE_TEAM_ID" \
            /tmp/ExportOptions-Mac-CI.plist
          # -allowProvisioningUpdates not needed here: the archive already has the profile embedded.
          # The API key flags authenticate the upload-to-App-Store-Connect portion only.
          xcodebuild -exportArchive \
            -archivePath "${{ env.MAC_ARCHIVE_PATH }}" \
            -exportPath "${{ env.MAC_EXPORT_PATH }}" \
            -exportOptionsPlist /tmp/ExportOptions-Mac-CI.plist \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Archive iOS app for App Store
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # The app target is iOS-only via TARGETED_DEVICE_FAMILY=2.
          xcodebuild archive \
            -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -archivePath "${{ env.IOS_ARCHIVE_PATH }}" \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Export and upload iOS app to App Store Connect
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          /usr/libexec/PlistBuddy \
            -c "Add :method string app-store-connect" \
            -c "Add :destination string upload" \
            -c "Add :signingStyle string manual" \
            -c "Add :signingCertificate string $IOS_APP_STORE_SIGNING_CERTIFICATE" \
            -c "Add :provisioningProfiles dict" \
            -c "Add :provisioningProfiles:org.centennialoss.midiscribe string $IOS_APP_STORE_PROFILE_UUID" \
            -c "Add :provisioningProfiles:org.centennialoss.midiscribe.shareextension string $IOS_APP_STORE_EXTENSION_PROFILE_UUID" \
            -c "Add :teamID string $APPLE_TEAM_ID" \
            /tmp/ExportOptions-iOS-CI.plist
          xcodebuild -exportArchive \
            -archivePath "${{ env.IOS_ARCHIVE_PATH }}" \
            -exportPath "${{ env.IOS_EXPORT_PATH }}" \
            -exportOptionsPlist /tmp/ExportOptions-iOS-CI.plist \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Verify release assets exist
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          ZIP_FILE="${{ env.SCHEME_NAME }}-${VERSION}-macOS-universal.zip"
          DMG_FILE="${{ env.SCHEME_NAME }}-${VERSION}-macOS-universal.dmg"

          if [ ! -f "$ZIP_FILE" ]; then
            echo "::error::Missing release asset: $ZIP_FILE"
            exit 1
          fi
          if [ ! -f "$DMG_FILE" ]; then
            echo "::error::Missing release asset: $DMG_FILE"
            exit 1
          fi

          ls -lh "$ZIP_FILE" "$DMG_FILE"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ env.SCHEME_NAME }}-*-macOS-universal.zip
            ${{ env.SCHEME_NAME }}-*-macOS-universal.dmg
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
